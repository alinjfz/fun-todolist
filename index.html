<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A simple and fun to-do list app built with vanilla JavaScript." />
    <meta name="author" content="Ali Najafzadeh" />

    <title>Fun To-Do List</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>

  <body>
    <div class="container-fluid main-bg d-flex align-items-center justify-content-center">
      <div class="todo-card">
        <h1 class="todo-title">
          <i class="fas fa-check-circle me-2"></i>My To-Do List
        </h1>

        <form id="todo-form" novalidate>
          <div class="input-group mb-4">
            <input
              type="text"
              id="todo-input"
              class="form-control"
              placeholder="What needs to be done?"
              autocomplete="off"
              autofocus
              maxlength="200"
            />
            <button class="btn btn-primary btn-add" type="submit">
              <i class="fas fa-plus me-1"></i>Add
            </button>
          </div>
        </form>

        <ul id="todo-list" class="todo-list list-unstyled mb-0"></ul>

        <div id="todo-footer" class="todo-footer d-none">
          <span id="items-left"></span>
          <button id="clear-completed" class="btn btn-sm btn-link text-danger">
            Clear completed
          </button>
        </div>
      </div>
    </div>

    <script src="./assets/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/main.js"></script>
  </body>
</html>
